services:
  # Backend API
  - type: web
    name: agricare-backend
    env: python
    rootDir: backend_fastapi
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false # You will set this in the Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # You will set this in the Render Dashboard
      - key: DATABASE_NAME
        value: agricare_db
      - key: FRONTEND_URL
        fromService:
          name: agricare-frontend
          type: web

  # Frontend Web App
  - type: web
    name: agricare-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: agricare-backend
          type: web
          property: host
